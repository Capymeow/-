<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業法務輔助系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 針對高亮搜尋關鍵字的自訂樣式 */
        .highlight {
            background-color: rgba(37, 99, 235, 0.2); 
            color: #1e3a8a; 
            font-weight: 700;
            padding: 0 4px;
            border-radius: 4px;
        }
        /* 自訂捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <header class="bg-slate-900 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">法務輔助查詢系統</h1>
            <div class="text-right text-sm">
                <span id="current-date" class="text-slate-400">系統載入中...</span>
                <span id="realtime-clock" class="ml-2 font-bold tracking-wider">00:00:00</span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8 space-y-10">

        <section id="search" class="bg-white p-8 rounded-lg shadow-sm border border-slate-200">
            <h2 class="text-2xl font-semibold mb-4 text-slate-800 border-l-4 border-blue-600 pl-3">快速查詢法條</h2>
            <div class="p-4 mb-6 bg-slate-100 rounded text-sm text-slate-600">
                <p id="db-status-msg">系統正在嘗試讀取本地法規資料庫 (data.json)...</p>
            </div>
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="資料庫載入中，請稍候..." disabled class="flex-1 px-4 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-100 disabled:cursor-not-allowed">
                <button id="searchBtn" onclick="searchLaw()" disabled class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white px-6 py-2 rounded font-medium transition">搜尋</button>
            </div>
            <div id="searchResults" class="mt-6 space-y-3">
                </div>
        </section>

        <section id="calculator" class="bg-white p-8 rounded-lg shadow-sm border border-slate-200">
            <h2 class="text-2xl font-semibold mb-4 text-slate-800 border-l-4 border-blue-600 pl-3">法定時程計算機</h2>
            <div class="p-4 mb-6 bg-slate-100 rounded text-sm text-slate-600">
                <p><strong>計算規則提示：</strong> 預設採用「始日不計入」（自隔日起算）。若末日落在週六或週日，將自動順延至下週一。</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">事件發生日</label>
                    <input type="date" id="startDate" class="w-full px-4 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">法定期間 (天數)</label>
                    <input type="number" id="days" placeholder="例如: 30" class="w-full px-4 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-end">
                    <button onclick="calculateLegalDate()" class="w-full bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded font-medium transition">計算到期日</button>
                </div>
            </div>
            <div id="resultBox" class="mt-6 hidden p-4 bg-blue-50 border border-blue-200 text-blue-800 rounded font-medium">
                期間之末日為：<span id="endDateResult" class="text-xl font-bold ml-2"></span>
                <p id="delayNotice" class="text-sm text-red-600 mt-2 hidden">註：原末日逢週末，已依法自動順延至下一個工作日。</p>
            </div>
        </section>

    </main>

    <script>
        // ==========================================
        // 1. 系統時間功能
        // ==========================================
        function updateClock() {
            const now = new Date();
            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById('realtime-clock').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==========================================
        // 2. 透過 Fetch 讀取 data.json 法規資料庫
        // ==========================================
        let lawDatabase = [];

        async function loadExternalJSON() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const statusMsg = document.getElementById('db-status-msg');
            
            try {
                // 讀取同一個資料夾下的 data.json 檔案
                const response = await fetch('data.json');
                if (!response.ok) throw new Error("網路請求失敗");
                
                // 【關鍵修改】：先讀取為「純文字」，不要直接解析 JSON
                let rawText = await response.text();
                
                // 自動修復 JSON 格式：將獨立的物件用逗號連起來，並在最外層加上中括號
                rawText = rawText.trim().replace(/}\s*{/g, '},{');
                if (!rawText.startsWith('[')) {
                    rawText = `[${rawText}]`;
                }

                // 將修復後的文字轉換為 JSON 物件
                const jsonData = JSON.parse(rawText);
                
                // 支援直接是陣列，或是包在 laws 屬性裡的 JSON
                lawDatabase = Array.isArray(jsonData) ? jsonData : (jsonData.laws || []);
                
                // 計算總共有幾條法規 (遍歷 law -> chapter -> article)
                let totalArticles = 0;
                lawDatabase.forEach(law => {
                    if (law.chapters) {
                        law.chapters.forEach(chapter => {
                            if (chapter.articles) totalArticles += chapter.articles.length;
                        });
                    }
                });

                searchInput.disabled = false;
                searchBtn.disabled = false;
                searchInput.placeholder = `請輸入關鍵字 (例如：選舉、會籍、權利)`;
                statusMsg.innerHTML = `<span class="text-blue-600 font-bold">讀取成功！</span> 系統載入完畢，共包含 ${totalArticles} 條法條。`;
            } catch (error) {
                console.error("載入失敗:", error);
                searchInput.placeholder = "無法載入 data.json";
                statusMsg.innerHTML = `<span class="text-red-600 font-bold">讀取失敗！</span> 檔案格式可能異常，請確認並使用 Live Server 開啟網頁。`;
            }
        }

        // 網頁載入完成後，立刻去抓取 JSON
        window.addEventListener('DOMContentLoaded', loadExternalJSON);

        function searchLaw() {
            const keyword = document.getElementById('searchInput').value.trim();
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = ''; 

            if (!keyword) {
                resultsContainer.innerHTML = '<p class="text-slate-500 p-4 bg-slate-50 rounded border border-slate-200">請輸入關鍵字。</p>';
                return;
            }

            if (!lawDatabase || lawDatabase.length === 0) return;
            let matchCount = 0;
            
            // 安全處理關鍵字，避免正則表達式報錯
            const safeKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${safeKeyword})`, 'gi');
            const highlightText = (text) => text.replace(regex, '<span class="highlight">$1</span>');

            // 針對新版 data.json 的層級結構進行遍歷
            lawDatabase.forEach(law => {
                const lawName = law.law_name || "";
                
                if (!law.chapters) return;
                law.chapters.forEach(chapter => {
                    const chapterName = chapter.chapter_name || "";
                    
                    if (!chapter.articles) return;
                    chapter.articles.forEach(article => {
                        const articleNum = article.article_number || "";
                        // 將 paragraphs 陣列組合成字串，用換行符號連接
                        const paragraphsArray = article.paragraphs || [];
                        const content = paragraphsArray.join('\n');

                        // 若法規名稱、章節、條號或內容包含關鍵字，則視為符合
                        if (lawName.includes(keyword) || chapterName.includes(keyword) || 
                            articleNum.includes(keyword) || content.includes(keyword)) {
                            matchCount++;
                            
                            // 將換行符號 (\n) 轉換為網頁的換行標籤
                            const formattedContent = content.replace(/\n/g, '<br><br>');

                            const lawDiv = document.createElement('div');
                            lawDiv.className = 'p-4 bg-slate-50 rounded border border-slate-200 hover:shadow-sm transition';
                            
                            // 判斷是否為「預設章節 (無分章)」，若是則不顯示章節名稱
                            const displayChapter = chapterName.includes("預設章節") ? "" : ` - ${highlightText(chapterName)}`;
                            
                            lawDiv.innerHTML = `
                                <h3 class="font-bold text-blue-800 mb-2">
                                    ${highlightText(lawName)}${displayChapter} - ${highlightText(articleNum)}
                                </h3>
                                <p class="text-slate-700 leading-relaxed text-sm max-h-60 overflow-y-auto custom-scrollbar pr-2">
                                    ${highlightText(formattedContent)}
                                </p>
                            `;
                            resultsContainer.appendChild(lawDiv);
                        }
                    });
                });
            });

            if (matchCount === 0) {
                resultsContainer.innerHTML = '<p class="text-slate-500 p-4 bg-slate-50 rounded border border-slate-200">找不到相關法條，請嘗試其他關鍵字。</p>';
            } else {
                const countDiv = document.createElement('div');
                countDiv.className = 'text-sm font-bold text-slate-500 mb-2';
                countDiv.innerText = `系統檢索完畢，共找到 ${matchCount} 條相關結果：`;
                resultsContainer.insertBefore(countDiv, resultsContainer.firstChild);
            }
        }

        // 支援按下 Enter 鍵直接搜尋
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchLaw();
        });

        // ==========================================
        // 3. 進階法定時程計算邏輯 (始日不計入＋假日順延)
        // ==========================================
        function calculateLegalDate() {
            const startDateInput = document.getElementById('startDate').value;
            const daysInput = parseInt(document.getElementById('days').value);
            const resultBox = document.getElementById('resultBox');
            const endDateResult = document.getElementById('endDateResult');
            const delayNotice = document.getElementById('delayNotice');

            if (!startDateInput || isNaN(daysInput)) {
                alert("請完整輸入發生日與天數！");
                return;
            }

            let date = new Date(startDateInput);
            
            // 【始日不計入邏輯】
            date.setDate(date.getDate() + daysInput);

            let isDelayed = false;

            // 【遇假日順延邏輯】(0是週日，6是週六)
            while (date.getDay() === 0 || date.getDay() === 6) {
                date.setDate(date.getDate() + 1);
                isDelayed = true;
            }

            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const dayOfWeek = weekDays[date.getDay()];

            endDateResult.innerText = `${yyyy} 年 ${mm} 月 ${dd} 日 (星期${dayOfWeek})`;
            
            if (isDelayed) {
                delayNotice.classList.remove('hidden');
            } else {
                delayNotice.classList.add('hidden');
            }

            resultBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
