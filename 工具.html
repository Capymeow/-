<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生議會工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .highlight {
            background-color: rgba(37, 99, 235, 0.2); 
            color: #1e3a8a; 
            font-weight: 700;
            padding: 0 4px;
            border-radius: 4px;
        }
        /* 自訂捲軸樣式，讓長篇法條捲動時更美觀 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <header class="bg-slate-900 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">🏛️ 學生議會工具箱</h1>
            <div class="text-right">
                <div id="current-date" class="text-sm text-slate-400">系統載入中...</div>
                <div id="realtime-clock" class="text-xl font-bold tracking-wider">00:00:00</div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8 space-y-8">

        <div class="bg-blue-50 border-l-4 border-blue-500 p-5 rounded-r-lg shadow-sm text-blue-800 font-medium text-lg flex items-center gap-3">
            <span>💡</span>
            <span id="daily-quote">系統載入中...</span>
        </div>

        <section id="search" class="bg-white p-8 rounded-lg shadow-sm border border-slate-200">
            <h2 class="text-2xl font-semibold mb-4 text-slate-800 border-l-4 border-blue-600 pl-3">中央法規檢索 (JSON 資料庫)</h2>
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="資料庫載入中，請稍候..." disabled class="flex-1 px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg transition disabled:bg-slate-100 disabled:cursor-not-allowed">
                <button id="searchBtn" onclick="searchLaw()" disabled class="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white px-8 py-3 rounded-lg font-medium transition text-lg shadow-sm">檢索</button>
            </div>
            <div id="searchResults" class="mt-6 space-y-4">
                </div>
        </section>

        <section id="calculator" class="bg-white p-8 rounded-lg shadow-sm border border-slate-200">
            <h2 class="text-2xl font-semibold mb-4 text-slate-800 border-l-4 border-blue-600 pl-3">法定時程推算機</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">請選擇基準日期 (如開會日或投票日)</label>
                    <input type="date" id="baseDate" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg transition">
                </div>
                <div>
                    <button onclick="calculateLegalDate()" class="w-full bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-lg font-medium transition text-lg shadow-sm">計算各項公告底線</button>
                </div>
            </div>
            
            <div id="resultBox" class="mt-8 hidden">
                <div class="p-6 bg-blue-50 border border-blue-200 rounded-lg">
                    <div class="mb-4 pb-4 border-b border-blue-200">
                        <span class="text-blue-800 font-medium">基準日期：</span>
                        <span id="baseDateDisplay" class="text-xl font-bold text-blue-900 ml-2"></span>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-start">
                            <div class="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded mt-0.5 mr-3">議事</div>
                            <div>
                                <div class="text-sm text-slate-500 mb-1">開會通知最晚發布期限 (前 7 日)</div>
                                <div id="noticeResult" class="text-lg font-semibold text-slate-800"></div>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <div class="bg-slate-700 text-white text-xs font-bold px-2 py-1 rounded mt-0.5 mr-3">選務</div>
                            <div>
                                <div class="text-sm text-slate-500 mb-1">選舉公告最晚發布期限 (前 20 日)</div>
                                <div id="electionResult" class="text-lg font-semibold text-slate-800"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // 1. 時間與心情小語
        function updateClock() {
            const now = new Date();
            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-TW', dateOptions);
            document.getElementById('realtime-clock').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const quotes = [
            "議事的本質，在於尋求多元意見的公約數。",
            "透明與效率，是現代議會的核心追求。",
            "程序正義不只是守則，更是民主的基礎。"
        ];
        document.getElementById('daily-quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

        // ==========================================
        // 2. 透過 Fetch 讀取外部 JSON 法規資料庫
        // ==========================================
        let lawDatabase = null;

        async function loadExternalJSON() {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            
            try {
                // 讀取同一個資料夾下的 JSON 檔案
                const response = await fetch('20251101國立陽明交通大學學生會中央法規彙編檔案.json');
                
                if (!response.ok) throw new Error("網路請求失敗");
                
                lawDatabase = await response.json();
                
                searchInput.disabled = false;
                searchBtn.disabled = false;
                searchInput.placeholder = `資料庫載入完成！共包含 ${lawDatabase.pages.length} 頁內容。請輸入關鍵字...`;
            } catch (error) {
                console.error("載入失敗:", error);
                searchInput.placeholder = "⚠️ 無法載入 JSON！請確認是否已透過 Local Server 開啟網頁。";
            }
        }

        // 網頁載入完成後，立刻去抓取 JSON
        window.addEventListener('DOMContentLoaded', loadExternalJSON);

        function searchLaw() {
            const keyword = document.getElementById('searchInput').value.trim();
            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = ''; 

            if (!keyword) {
                resultsContainer.innerHTML = '<p class="text-slate-500 p-4 bg-slate-50 rounded-lg border border-slate-200">請輸入檢索關鍵字。</p>';
                return;
            }

            let matchCount = 0;

            // 針對 JSON 裡面的每一頁進行搜尋
            lawDatabase.pages.forEach(page => {
                // 將該頁的陣列文字組合起來（使用 <br><br> 分段以利閱讀）
                let fullPageText = "";
                if(page.content) {
                    fullPageText = page.content.map(item => item.text).join('<br><br>');
                }
                
                if (fullPageText.includes(keyword)) {
                    matchCount++;
                    const lawDiv = document.createElement('div');
                    lawDiv.className = 'p-6 bg-slate-50 rounded-lg border border-slate-200 border-l-4 border-l-blue-500 shadow-sm';
                    
                    // 螢光筆高亮效果
                    const safeKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(${safeKeyword})`, 'gi');
                    const highlightedText = fullPageText.replace(regex, '<span class="highlight">$1</span>');

                    lawDiv.innerHTML = `
                        <h3 class="font-bold text-blue-900 mb-3 text-lg flex justify-between items-center">
                            <span>📄 第 ${page.page_id} 頁</span>
                        </h3>
                        <div class="text-slate-700 leading-relaxed text-sm max-h-60 overflow-y-auto custom-scrollbar pr-3">
                            ${highlightedText}
                        </div>
                    `;
                    resultsContainer.appendChild(lawDiv);
                }
            });

            if (matchCount === 0) {
                resultsContainer.innerHTML = '<p class="text-slate-500 p-4 bg-slate-50 rounded-lg border border-slate-200">查無相關內容，請嘗試其他關鍵字。</p>';
            } else {
                const countDiv = document.createElement('div');
                countDiv.className = 'text-sm font-bold text-slate-500 mb-2 px-1';
                countDiv.innerText = `系統檢索完畢，共在 ${matchCount} 頁中找到相關結果：`;
                resultsContainer.insertBefore(countDiv, resultsContainer.firstChild);
            }
        }

        // 支援 Enter 鍵搜尋
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchLaw();
        });

        // 3. 時程計算機
        function calculateLegalDate() {
            const startDateInput = document.getElementById('baseDate').value;
            const resultBox = document.getElementById('resultBox');
            if (!startDateInput) return alert("請先選擇基準日期！");
            
            const baseDate = new Date(startDateInput);
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const formatDate = (dateObj) => {
                const yyyy = dateObj.getFullYear();
                const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
                const dd = String(dateObj.getDate()).padStart(2, '0');
                return `${yyyy} 年 ${mm} 月 ${dd} 日 (星期${weekDays[dateObj.getDay()]})`;
            };

            document.getElementById('baseDateDisplay').innerText = formatDate(baseDate);

            const noticeDate = new Date(baseDate);
            noticeDate.setDate(baseDate.getDate() - 7);
            document.getElementById('noticeResult').innerText = formatDate(noticeDate);

            const electionNoticeDate = new Date(baseDate);
            electionNoticeDate.setDate(baseDate.getDate() - 20);
            document.getElementById('electionResult').innerText = formatDate(electionNoticeDate);

            resultBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
